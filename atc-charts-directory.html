    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Azeret+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #00d4ff; --secondary: #ff6b35;
            --bg-dark: #0a0e17; --bg-surface: #141922; --bg-elevated: #1e2530;
            --text-primary: #e8eaed; --text-secondary: #9aa0a6; --border: #2a3441;
        }
        body {
            font-family: 'Azeret Mono', monospace;
            background: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.3; z-index: -1;
            animation: gridMove 20s linear infinite;
        }
        @keyframes gridMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }
        .radar-bg {
            position: fixed; top: 50%; right: -10%;
            width: 600px; height: 600px; border-radius: 50%;
            border: 2px solid var(--primary); opacity: 0.1; z-index: -1;
            animation: radarPulse 4s ease-in-out infinite;
        }
        .radar-bg::before, .radar-bg::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); border-radius: 50%;
            border: 2px solid var(--primary);
        }
        .radar-bg::before { width: 70%; height: 70%; }
        .radar-bg::after { width: 40%; height: 40%; }
        @keyframes radarPulse {
            0%, 100% { transform: scale(1); opacity: 0.1; }
            50% { transform: scale(1.1); opacity: 0.15; }
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        header {
            margin-bottom: 3rem; padding: 3rem 0;
            border-bottom: 2px solid var(--border);
        }
        h1 {
            font-family: 'Orbitron', sans-serif; font-size: 3.5rem;
            font-weight: 900; letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 0.5rem;
            animation: slideInLeft 0.8s ease-out;
        }
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .subtitle {
            font-size: 1.1rem; color: var(--text-secondary);
            font-weight: 300; letter-spacing: 0.05em;
            animation: fadeIn 1s ease-out 0.2s backwards;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .controls {
            background: var(--bg-surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 2rem; margin-bottom: 2rem;
            display: grid; gap: 1.5rem;
        }
        .search-box { position: relative; }
        .search-box input {
            width: 100%; padding: 1rem 1rem 1rem 3rem;
            background: var(--bg-elevated); border: 2px solid var(--border);
            border-radius: 8px; color: var(--text-primary);
            font-family: 'Azeret Mono', monospace; font-size: 1rem;
            transition: all 0.3s ease;
        }
        .search-box input:focus {
            outline: none; border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }
        .search-box::before {
            content: '🔍'; position: absolute;
            left: 1rem; top: 50%; transform: translateY(-50%);
            font-size: 1.2rem;
        }
        .filters { display: flex; gap: 1rem; flex-wrap: wrap; }
        .filter-btn {
            padding: 0.6rem 1.2rem; background: var(--bg-elevated);
            border: 2px solid var(--border); border-radius: 6px;
            color: var(--text-secondary); font-family: 'Azeret Mono', monospace;
            font-size: 0.85rem; cursor: pointer; transition: all 0.2s ease;
            text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500;
        }
        .filter-btn:hover {
            border-color: var(--primary); color: var(--text-primary);
            transform: translateY(-2px);
        }
        .filter-btn.active {
            background: var(--primary); border-color: var(--primary);
            color: var(--bg-dark); font-weight: 700;
        }
        .stats {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem; margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--bg-surface); border: 1px solid var(--border);
            border-radius: 8px; padding: 1.5rem; text-align: center;
            position: relative; overflow: hidden;
        }
        .stat-card::before {
            content: ''; position: absolute; top: 0; left: 0;
            width: 100%; height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }
        .stat-number {
            font-family: 'Orbitron', sans-serif; font-size: 2.5rem;
            font-weight: 900; color: var(--primary);
            display: block; margin-bottom: 0.25rem;
        }
        .stat-label {
            font-size: 0.75rem; color: var(--text-secondary);
            text-transform: uppercase; letter-spacing: 0.1em;
        }
        .directory { display: grid; gap: 1rem; }
        .folder {
            background: var(--bg-surface); border: 1px solid var(--border);
            border-radius: 10px; padding: 1.5rem; transition: all 0.3s ease;
            position: relative; overflow: hidden;
        }
        .folder::before {
            content: ''; position: absolute; top: 0; left: 0;
            width: 4px; height: 100%;
            background: linear-gradient(180deg, var(--primary), var(--secondary));
            opacity: 0; transition: opacity 0.3s ease;
        }
        .folder:hover {
            border-color: var(--primary); transform: translateX(8px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.1);
        }
        .folder:hover::before { opacity: 1; }
        .folder-header {
            display: flex; align-items: center; gap: 1rem;
            margin-bottom: 1rem; cursor: pointer;
        }
        .folder-icon { font-size: 1.5rem; filter: grayscale(0.3); }
        .folder-name {
            font-family: 'Orbitron', sans-serif; font-size: 1.2rem;
            font-weight: 700; color: var(--text-primary); flex: 1;
        }
        .folder-count {
            background: var(--bg-elevated); color: var(--primary);
            padding: 0.25rem 0.75rem; border-radius: 20px;
            font-size: 0.75rem; font-weight: 700;
        }
        .folder-toggle {
            color: var(--text-secondary); transition: transform 0.3s ease;
        }
        .folder.expanded .folder-toggle { transform: rotate(90deg); }
        .file-list {
            display: none; padding-left: 2.5rem; gap: 0.5rem;
            flex-direction: column;
        }
        .folder.expanded .file-list { display: flex; }
        .file-item {
            display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem;
            background: var(--bg-elevated); border: 1px solid var(--border);
            border-radius: 6px; transition: all 0.2s ease;
            text-decoration: none; color: #ffffff;
        }
        .file-item:hover {
            background: var(--bg-dark); border-color: var(--secondary);
            transform: translateX(4px);
        }
        .file-item:visited { color: #ffffff; }
        .file-icon { font-size: 1.1rem; }
        .file-name { flex: 1; font-size: 0.9rem; color: #ffffff; }
        .file-type {
            background: var(--secondary); color: white;
            padding: 0.2rem 0.5rem; border-radius: 4px;
            font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
        }
        .pin-btn {
            background: none; border: none; cursor: pointer;
            font-size: 1rem; opacity: 0.3; transition: all 0.2s ease;
            padding: 0.1rem 0.2rem; line-height: 1;
            color: var(--primary);
        }
        .pin-btn:hover { opacity: 0.8; transform: scale(1.2); }
        .pin-btn.pinned { opacity: 1; filter: none; }
        .file-item.is-pinned { border-color: var(--primary); }
        .pinned-section {
            background: var(--bg-surface); border: 1px solid var(--primary);
            border-radius: 10px; padding: 1.5rem; margin-bottom: 1.5rem;
            display: none;
        }
        .pinned-section.has-pins { display: block; }
        .pinned-section-title {
            font-family: 'Orbitron', sans-serif; font-size: 0.9rem;
            color: var(--primary); letter-spacing: 0.1em;
            text-transform: uppercase; margin-bottom: 1rem;
        }
        .pinned-list { display: flex; flex-direction: column; gap: 0.5rem; }
        .empty-state {
            text-align: center; padding: 4rem 2rem; color: var(--text-secondary);
        }
        .empty-state-icon { font-size: 4rem; margin-bottom: 1rem; opacity: 0.3; }
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .stats { grid-template-columns: 1fr; }
        }
    </style>
</head>

            return icons[type] || '📄';

        function updateStats() {
            const totalFiles = directoryData.reduce((sum, folder) => sum + folder.files.length, 0);
            const totalFolders = directoryData.length;
            const visibleFolders = document.querySelectorAll('.folder:not([style*="display: none"])').length;

        function savePins() {

        }

        function updatePinnedSection() {
            const section = document.getElementById('pinnedSection');
            const list = document.getElementById('pinnedList');
            if (pinnedIds.size === 0) {
                section.classList.remove('has-pins');
                return;
            }
            section.classList.add('has-pins');
            list.innerHTML = '';
            directoryData.forEach(folder => {
                folder.files.forEach(file => {

                    const a = document.createElement('a');
                    a.href = file.url;
                    a.target = '_blank';
                    a.className = 'file-item is-pinned';
                    a.dataset.type = file.type;

                        <span class="file-name">${file.name}</span>
                        <span class="file-type">${file.type}</span>
                        <button class="pin-btn pinned" data-id="${file.id}" title="Unpin">&#128204;</button>

                    a.querySelector('.pin-btn').addEventListener('click', e => {

                        pinnedIds.delete(file.id);
                        savePins();
                        updatePinnedSection();
                        document.querySelectorAll(`.pin-btn[data-id="${CSS.escape(file.id)}"]`).forEach(btn => {
                            btn.classList.remove('pinned');
                            btn.closest('.file-item').classList.remove('is-pinned');
                        });
                    });
                    list.appendChild(a);
                });
            });
        }

        function renderDirectory() {
            const directoryEl = document.getElementById('directory');
            directoryEl.innerHTML = '';
            directoryData.forEach((folder, folderIndex) => {
                const folderEl = document.createElement('div');
                folderEl.className = 'folder';
                folderEl.dataset.folderIndex = folderIndex;
                folderEl.innerHTML = `
                    <div class="folder-header">
                        <span class="folder-icon">${folder.icon}</span>
                        <span class="folder-name">${folder.name}</span>
                        <span class="folder-count">${folder.files.length}</span>
                        <span class="folder-toggle">&#9658;</span>
                    </div>
                    <div class="file-list"></div>
                `;
                const fileList = folderEl.querySelector('.file-list');
                folder.files.forEach(file => {
                    const a = document.createElement('a');
                    a.href = file.url;
                    a.target = '_blank';
                    a.className = 'file-item' + (pinnedIds.has(file.id) ? ' is-pinned' : '');
                    a.dataset.type = file.type;
                    a.innerHTML = `
                        <span class="file-icon">${getFileTypeIcon(file.type)}</span>
                        <span class="file-name">${file.name}</span>
                        <span class="file-type">${file.type}</span>
                        <button class="pin-btn${pinnedIds.has(file.id) ? ' pinned' : ''}" data-id="${file.id}" title="Pin chart">&#128204;</button>
                    `;
                    a.querySelector('.pin-btn').addEventListener('click', e => {
                        e.preventDefault(); e.stopPropagation();
                        const id = file.id;
                        if (pinnedIds.has(id)) {
                            pinnedIds.delete(id);
                            e.currentTarget.classList.remove('pinned');
                            a.classList.remove('is-pinned');
                        } else {
                            pinnedIds.add(id);
                            e.currentTarget.classList.add('pinned');
                            a.classList.add('is-pinned');
                        }
                        savePins();
                        updatePinnedSection();
                    });
                    fileList.appendChild(a);
                });
                directoryEl.appendChild(folderEl);
            });
            document.querySelectorAll('.folder-header').forEach(header => {
                header.addEventListener('click', function() {
                    this.parentElement.classList.toggle('expanded');
                });
            });
            updateStats();
            updatePinnedSection();
        }
        function filterFiles() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const folders = document.querySelectorAll('.folder');
            let visibleCount = 0;
            let hasVisibleItems = false;
            folders.forEach(folder => {
                const folderName = folder.querySelector('.folder-name').textContent.toLowerCase();
                const files = folder.querySelectorAll('.file-item');
                let hasVisibleFile = false;
                files.forEach(file => {
                    const fileName = file.querySelector('.file-name').textContent.toLowerCase();
                    const fileType = file.dataset.type;
                    const matchesSearch = fileName.includes(searchTerm) || folderName.includes(searchTerm);
                    const matchesFilter = currentFilter === 'all' || fileType === currentFilter;
                    if (matchesSearch && matchesFilter) {
                        file.style.display = 'flex';
                        hasVisibleFile = true;
                    } else {
                        file.style.display = 'none';
                    }
                });
                if (currentFilter === 'folder' || (hasVisibleFile && currentFilter !== 'folder')) {
                    folder.style.display = 'block';
                    visibleCount++;
                    hasVisibleItems = true;
                    if (searchTerm && hasVisibleFile) {
                        folder.classList.add('expanded');
                    }
                } else {
                    folder.style.display = 'none';
                }
            });
            document.getElementById('emptyState').style.display = hasVisibleItems ? 'none' : 'block';
            document.getElementById('directory').style.display = hasVisibleItems ? 'grid' : 'none';
            document.getElementById('visibleItems').textContent = visibleCount;
        }
        document.getElementById('searchInput').addEventListener('input', filterFiles);
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                filterFiles();
            });
        });
        renderDirectory();
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                document.getElementById('searchInput').focus();
            }
        });
    </script>
</body>
</html>
