<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATC Charts Directory</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface-hover: #1c2128;
            --border: #30363d;
            --text: #e6edf3;
            --text-dim: #7d8590;
            --accent: #79b8ff;
            --accent-glow: rgba(121, 184, 255, 0.15);
            --warning: #d29922;
        }
        
        body {
            font-family: 'IBM Plex Mono', monospace;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 2px, var(--border) 2px, var(--border) 3px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, var(--border) 2px, var(--border) 3px);
            background-size: 60px 60px;
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; position: relative; z-index: 1; }
        
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            color: var(--text-dim);
        }
        
        .breadcrumb a { color: var(--accent); text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }
        .breadcrumb-separator { opacity: 0.5; }
        
        header {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        
        h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.02em;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
        }
        
        .subtitle {
            font-size: 0.875rem;
            color: var(--text-dim);
        }
        
        .search-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .search-wrapper { position: relative; margin-bottom: 0.5rem; }
        
        .search-input {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 2.75rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        
        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
        }
        
        .search-help {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 0.5rem;
        }
        
        .search-help code {
            background: var(--bg);
            padding: 0.15rem 0.4rem;
            border-radius: 3px;
            color: var(--accent);
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 3rem;
        }
        
        .stat {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            text-align: center;
        }
        
        .stat-value {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            display: block;
            margin-bottom: 0.25rem;
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-dim);
        }
        
        .filters {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        
        .filter-btn {
            padding: 0.5rem 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-dim);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        
        .filter-btn:hover { border-color: var(--accent); color: var(--text); }
        .filter-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }
    
        
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }
        
        .region-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 2rem;
            text-decoration: none;
            color: var(--text);
            transition: all 0.2s;
            position: relative;
        }
        
        .region-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--accent);
            transform: scaleY(0);
            transition: transform 0.2s;
        }
        
        .region-card:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(121, 184, 255, 0.15);
        }
        
        .region-card:hover::before {
            transform: scaleY(1);
        }
        
        .card-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }
        
        .card-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        
        .card-count {
            font-size: 0.875rem;
            color: var(--text-dim);
        }
        
        .card-count strong {
            color: var(--accent);
        }

        /* Pinned section */
        .pinned-section {
            margin-bottom: 2rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
        }

        .pinned-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .pinned-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-dim);
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .clear-pins-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s;
        }
        .clear-pins-btn:hover { border-color: var(--accent); color: var(--accent); }

        .pinned-sub-title {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 0.75rem 0 0.5rem;
            padding-bottom: 0.25rem;
            border-bottom: 1px solid var(--border);
        }

        .pinned-airports-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 0.6rem;
        }

        .pinned-airport-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.6rem 0.75rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            transition: border-color 0.15s;
        }
        .pinned-airport-card:hover { border-color: var(--accent); }

        .pinned-airport-link {
            text-decoration: none;
            color: var(--text);
            flex: 1;
            min-width: 0;
        }

        .pinned-airport-code {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--accent);
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .pinned-airport-meta {
            font-size: 0.75rem;
            color: var(--text-dim);
            display: block;
        }

        .pinned-charts-list {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .pinned-chart-item {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.6rem 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: border-color 0.15s;
        }
        .pinned-chart-item:hover { border-color: var(--accent); }

        .pinned-chart-link {
            text-decoration: none;
            color: var(--text);
            flex: 1;
            min-width: 0;
        }

        .pinned-chart-name {
            font-size: 0.8rem;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .pinned-chart-meta {
            font-size: 0.75rem;
            color: var(--text-dim);
            display: block;
            margin-top: 0.1rem;
        }

        .unpin-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.75rem;
            color: var(--text-dim);
            padding: 0.2rem 0.3rem;
            opacity: 0.5;
            transition: opacity 0.2s, color 0.2s;
            flex-shrink: 0;
            line-height: 1;
        }
        .unpin-btn:hover { opacity: 1; color: var(--accent); }
    
    .pin-card-wrapper { min-width: 0; }
    .pin-card { min-width: 0; }
    .pin-info { flex: 1; min-width: 0; }
    .pin-name { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pin-meta { font-size: 0.75rem; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .result-name { font-weight: 600; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .result-meta { font-size: 0.8rem; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-name { flex: 1; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
    .file-item { display: flex; align-items: center; gap: 0.75rem; padding: 1rem 1.25rem; text-decoration: none; color: var(--text); transition: all 0.15s; min-width: 0; }

    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>ATC Charts Directory</h1>
            <div class="subtitle">Select a region to browse charts</div>
        </header>
        
        <div id="pinnedSection" class="pinned-section" style="display:none">
            <div class="pinned-header">
                <span class="pinned-title">📌 Pinned</span>
                <button class="clear-all-btn" onclick="clearAllPins()">Clear all</button>
            </div>
            <div id="pinnedAirports"></div>
            <div id="pinnedCharts"></div>
        </div>

        <div class="stats">
            <div class="stat">
                <span class="stat-value">4</span>
                <span class="stat-label">Regions</span>
            </div>
            <div class="stat">
                <span class="stat-value">74</span>
                <span class="stat-label">Airports</span>
            </div>
            <div class="stat">
                <span class="stat-value">1514</span>
                <span class="stat-label">Total Files</span>
            </div>
        </div>
        
        <div class="card-grid">
            
            <a href="canada.html" class="region-card">
                <span class="card-icon">🇨🇦</span>
                <div class="card-title">CANADA</div>
                <div class="card-count">
                    <strong>27</strong> airports • 
                    <strong>966</strong> files
                </div>
            </a>
            
            <a href="ireland.html" class="region-card">
                <span class="card-icon">🇮🇪</span>
                <div class="card-title">Ireland</div>
                <div class="card-count">
                    <strong>10</strong> airports • 
                    <strong>144</strong> files
                </div>
            </a>
            
            <a href="netherlands.html" class="region-card">
                <span class="card-icon">🇳🇱</span>
                <div class="card-title">Netherlands</div>
                <div class="card-count">
                    <strong>25</strong> airports • 
                    <strong>221</strong> files
                </div>
            </a>
            
            <a href="switzerland.html" class="region-card">
                <span class="card-icon">🇨🇭</span>
                <div class="card-title">Switzerland</div>
                <div class="card-count">
                    <strong>12</strong> airports • 
                    <strong>183</strong> files
                </div>
            </a>
            
        </div>
    </div>
    <script>
        const PINS_KEY = 'atc_pins';
        function getPins() {
            try { return JSON.parse(localStorage.getItem(PINS_KEY)) || {airports: [], charts: []}; }
            catch(e) { return {airports: [], charts: []}; }
        }
        function savePins(p) { localStorage.setItem(PINS_KEY, JSON.stringify(p)); }

                function renderPins() {
            const pins = getPins();
            const section = document.getElementById('pinnedSection');
            const grid = document.getElementById('pinnedGrid');

            if (pins.airports.length === 0 && pins.charts.length === 0) {
                section.style.display = 'none';
                return;
            }

            section.style.display = 'block';
            grid.innerHTML = '';

            pins.airports.forEach(a => {
                const wrapper = document.createElement('div');
                wrapper.className = 'pin-card-wrapper';
                wrapper.style.display = 'flex';
                wrapper.style.alignItems = 'center';
                wrapper.style.background = 'var(--surface)';
                wrapper.style.border = '1px solid var(--border)';
                wrapper.style.borderRadius = '6px';
                wrapper.style.transition = 'all 0.2s';

                const card = document.createElement('a');
                card.className = 'pin-card';
                card.href = a.slug + '.html';
                card.style.border = 'none';
                card.style.flex = '1';
                card.style.minWidth = '0';
                card.innerHTML = `
                    <span style="font-size: 1.25rem;">✈️</span>
                    <div class="pin-info">
                        <div class="pin-name">${a.name}</div>
                        <div class="pin-meta">${a.region}</div>
                    </div>
                `;

                const unpinBtn = document.createElement('button');
                unpinBtn.className = 'unpin-btn';
                unpinBtn.innerHTML = '✕';
                unpinBtn.title = 'Unpin';
                unpinBtn.onclick = (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    toggleAirportPin(a);
                    renderPins();
                };

                
                wrapper.appendChild(card);
            
                wrapper.appendChild(unpinBtn);
                grid.appendChild(wrapper);
            });

            pins.charts.forEach(c => {
                const wrapper = document.createElement('div');
                wrapper.className = 'pin-card-wrapper';
                wrapper.style.display = 'flex';
                wrapper.style.alignItems = 'center';
                wrapper.style.background = 'var(--surface)';
                wrapper.style.border = '1px solid var(--border)';
                wrapper.style.borderRadius = '6px';
                wrapper.style.transition = 'all 0.2s';

                const card = document.createElement('a');
                card.className = 'pin-card';
                card.style.border = 'none';
                card.style.flex = '1';
                card.style.minWidth = '0';

                // Robust recovery for old pins
                let id = c.id;
                let localUrl = c.localUrl;
                let driveUrl = c.url;
                let name = c.name;

                if ((!id || !localUrl) && typeof searchIndex !== 'undefined') {
                    const found = searchIndex.find(item => 
                        (c.id && item.id === c.id) || 
                        (c.url && item.url.split('?')[0] === c.url.split('?')[0]) ||
                        (item.name === c.name && item.airport === c.airport)
                    );
                    if (found) {
                        id = id || found.id;
                        localUrl = localUrl || found.localUrl;
                        driveUrl = driveUrl || found.url;
                        console.log('🔄 Recovered pin data for:', name);
                    }
                }

                if (localUrl && localUrl !== '#') {
                    card.href = `#view=${id}`;
                    card.onclick = (e) => { 
                        if (e.ctrlKey || e.metaKey) return;
                        e.preventDefault(); 
                        openViewer(id, name, driveUrl, localUrl, false, c.airport);
                    };
                } else {
                    console.warn('⚠️ Pin missing localUrl, falling back to Drive:', name);
                    card.href = driveUrl || '#';
                    card.target = '_blank';
                }
                card.innerHTML = `
                    <span style="font-size: 1.25rem;">📄</span>
                    <div class="pin-info">
                        <div class="pin-name">${c.name}</div>
                        <div class="pin-meta">${c.airport} • ${c.region}</div>
                    </div>
                `;

                const unpinBtn = document.createElement('button');
                unpinBtn.className = 'unpin-btn';
                unpinBtn.innerHTML = '✕';
                unpinBtn.title = 'Unpin';
                unpinBtn.onclick = (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    toggleChartPin(c);
                    renderPins();
                };

                
                wrapper.appendChild(card);
            
                wrapper.appendChild(unpinBtn);
                grid.appendChild(wrapper);
            });
        }
            section.style.display = 'block';

            const airportsEl = document.getElementById('pinnedAirports');
            const chartsEl = document.getElementById('pinnedCharts');
            airportsEl.innerHTML = '';
            chartsEl.innerHTML = '';

            if (pins.airports.length > 0) {
                const title = document.createElement('div');
                title.className = 'pinned-sub-title';
                title.textContent = 'Airports';
                airportsEl.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'pinned-airports-grid';

                pins.airports.forEach(function(airport) {
                    const card = document.createElement('div');
                    card.className = 'pinned-airport-card';

                    const link = document.createElement('a');
                    link.className = 'pinned-airport-link';
                    link.href = airport.slug + '.html';
                    link.innerHTML = '<span class="pinned-airport-code">' + airport.icao + '</span>' +
                        '<span class="pinned-airport-meta">' + airport.region + ' &bull; ' + airport.fileCount + ' files</span>';

                    const unpinBtn = document.createElement('button');
                    unpinBtn.className = 'unpin-btn';
                    unpinBtn.title = 'Unpin';
                    unpinBtn.textContent = '✕';
                    unpinBtn.onclick = function() {
                        unpinAirport(airport.slug, card);
                    };

                    card.appendChild(link);
                    card.appendChild(unpinBtn);
                    grid.appendChild(card);
                });
                airportsEl.appendChild(grid);
            }

            if (pins.charts.length > 0) {
                const title = document.createElement('div');
                title.className = 'pinned-sub-title';
                title.textContent = 'Charts';
                chartsEl.appendChild(title);

                const list = document.createElement('div');
                list.className = 'pinned-charts-list';

                pins.charts.forEach(function(chart) {
                    const item = document.createElement('div');
                    item.className = 'pinned-chart-item';

                    const icon = document.createElement('span');
                    icon.style.fontSize = '1rem';
                    icon.textContent = '📄';

                    const link = document.createElement('a');
                    link.className = 'pinned-chart-link';
                    link.href = chart.url;
                    link.target = '_blank';
                    link.innerHTML = '<span class="pinned-chart-name">' + chart.name + '</span>' +
                        '<span class="pinned-chart-meta">' + chart.airport + ' &bull; ' + chart.region + '</span>';

                    const unpinBtn = document.createElement('button');
                    unpinBtn.className = 'unpin-btn';
                    unpinBtn.title = 'Unpin';
                    unpinBtn.textContent = '✕';
                    unpinBtn.onclick = function() {
                        unpinChart(chart.url, item);
                    };

                    item.appendChild(icon);
                    item.appendChild(link);
                    item.appendChild(unpinBtn);
                    list.appendChild(item);
                });
                chartsEl.appendChild(list);
            }
        }

        function unpinAirport(slug, cardEl) {
            const pins = getPins();
            pins.airports = pins.airports.filter(function(a) { return a.slug !== slug; });
            savePins(pins);
            cardEl.remove();
            checkPinnedEmpty();
        }

        function unpinChart(url, itemEl) {
            const pins = getPins();
            pins.charts = pins.charts.filter(function(c) { return c.url !== url; });
            savePins(pins);
            itemEl.remove();
            checkPinnedEmpty();
        }

        function checkPinnedEmpty() {
            const pins = getPins();
            if (pins.airports.length === 0 && pins.charts.length === 0) {
                document.getElementById('pinnedSection').style.display = 'none';
            }
        }

        function clearAllPins() {
            savePins({airports: [], charts: []});
            document.getElementById('pinnedSection').style.display = 'none';
        }

        renderPins();
    </script>
</body>
</html>
