    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface-hover: #1c2128;
            --border: #30363d;
            --text: #e6edf3;
            --text-dim: #7d8590;
            --accent: #58a6ff;
            --accent-glow: rgba(88, 166, 255, 0.15);
            --success: #3fb950;
            --warning: #d29922;
        }

        body {
            font-family: 'IBM Plex Mono', monospace;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Subtle grid background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 2px, var(--border) 2px, var(--border) 3px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, var(--border) 2px, var(--border) 3px);
            background-size: 60px 60px;
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        header {
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.02em;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.875rem;
            color: var(--text-dim);
            font-weight: 300;
            letter-spacing: 0.1em;
        }

        /* Search Section */
        .search-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .search-wrapper {
            position: relative;
            margin-bottom: 1rem;
        }

        .search-input {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 2.75rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        .search-help {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 0.5rem;
        }

        .search-help code {
            background: var(--bg);
            padding: 0.15rem 0.4rem;
            border-radius: 3px;
            color: var(--accent);
            font-size: 0.7rem;
        }

        /* Filters */
        .filters {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.5rem 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-dim);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .filter-btn:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg);
        }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            text-align: center;
        }

        .stat-value {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            display: block;
            line-height: 1;
            margin-bottom: 0.25rem;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Directory Grid */
        .directory {
            display: grid;
            gap: 1rem;
        }

        .folder {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
            transition: all 0.2s;
        }

        .folder:hover {
            border-color: var(--accent);
            box-shadow: 0 4px 12px rgba(88, 166, 255, 0.1);
        }

        .folder-header {
            padding: 1rem 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            user-select: none;
            background: var(--surface);
            transition: background 0.2s;
        }

        .folder-header:hover {
            background: var(--surface-hover);
        }

        .folder-icon {
            font-size: 1.25rem;
            flex-shrink: 0;
        }

        .folder-name {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            flex: 1;
            color: var(--text);
        }

        .folder-count {
            font-size: 0.75rem;
            color: var(--text-dim);
            background: var(--bg);
            padding: 0.25rem 0.6rem;
            border-radius: 12px;
            font-weight: 600;
        }

        .folder-toggle {
            color: var(--text-dim);
            transition: transform 0.2s;
            font-size: 0.75rem;
        }

        .folder.expanded .folder-toggle {
            transform: rotate(90deg);
        }

        .file-list {
            display: none;
            border-top: 1px solid var(--border);
            background: var(--bg);
        }

        .folder.expanded .file-list {
            display: block;
        }

        .file-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1.25rem;
            border-bottom: 1px solid var(--border);
            text-decoration: none;
            color: var(--text);
            transition: all 0.15s;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-item:hover {
            background: var(--surface-hover);
            padding-left: 1.5rem;
        }

        .file-icon {
            font-size: 1rem;
            flex-shrink: 0;
            opacity: 0.7;
        }

        .file-name {
            flex: 1;
            font-size: 0.85rem;
            word-break: break-word;
        }

        .file-type {
            font-size: 0.65rem;
            color: var(--text-dim);
            background: var(--surface);
            padding: 0.2rem 0.5rem;
            border-radius: 3px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        /* Highlight matched text */
        .highlight {
            background: var(--warning);
            color: var(--bg);
            padding: 0 0.2rem;
            border-radius: 2px;
            font-weight: 600;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-dim);
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-dim);
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.75rem;
            }
            
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }
    </style>
</head>

        // ============================================================================

        let fuse;
        let currentFilter = 'all';
        let allItems = [];

        // File type icons
        const fileIcons = {
            pdf: '📄',
            image: '🖼️',
            doc: '📝',
            sheet: '📊',
            presentation: '📊'
        };

        // Initialize
        function init() {
            // Flatten data for fuzzy search
            allItems = [];
            directoryData.forEach((folder, folderIndex) => {
                folder.files.forEach((file, fileIndex) => {
                    allItems.push({
                        folderIndex,
                        fileIndex,
                        folderName: folder.name,
                        fileName: file.name,
                        fileType: file.type,
                        fileUrl: file.url,
                        searchText: `${folder.name} ${file.name}`.toLowerCase()
                    });
                });
            });

            // Initialize Fuse.js with fuzzy search
            fuse = new Fuse(allItems, {
                keys: [
                    { name: 'folderName', weight: 0.4 },
                    { name: 'fileName', weight: 0.6 }
                ],
                threshold: 0.4, // Lower = more strict, Higher = more fuzzy
                includeScore: true,
                includeMatches: true,
                minMatchCharLength: 2
            });

            renderDirectory();
            updateStats();
            attachEventListeners();
        }

        // Render directory
        function renderDirectory(searchResults = null) {
            const directoryEl = document.getElementById('directory');
            directoryEl.innerHTML = '';

            let visibleFolders = 0;

            directoryData.forEach((folder, folderIndex) => {
                let filesToShow = folder.files;

                // Filter by search results
                if (searchResults) {
                    const folderResults = searchResults.filter(r => r.item.folderIndex === folderIndex);
                    if (folderResults.length === 0) return;
                    
                    filesToShow = folderResults.map(r => ({
                        ...folder.files[r.item.fileIndex],
                        matches: r.matches
                    }));
                }

                // Filter by file type
                if (currentFilter !== 'all') {
                    filesToShow = filesToShow.filter(f => f.type === currentFilter);
                }

                if (filesToShow.length === 0) return;

                visibleFolders++;

                const folderEl = document.createElement('div');
                folderEl.className = 'folder';
                folderEl.dataset.folderIndex = folderIndex;

                const fileListHTML = filesToShow.map(file => {
                    let displayName = file.name;
                    
                    // Highlight matches if available
                    if (file.matches) {
                        file.matches.forEach(match => {
                            if (match.key === 'fileName') {
                                match.indices.forEach(([start, end]) => {
                                    const before = displayName.slice(0, start);
                                    const matched = displayName.slice(start, end + 1);
                                    const after = displayName.slice(end + 1);
                                    displayName = before + `<span class="highlight">${matched}</span>` + after;
                                });
                            }
                        });
                    }

                    return `
                        <a href="${file.url}" target="_blank" class="file-item" data-type="${file.type}">
                            <span class="file-icon">${fileIcons[file.type] || '📄'}</span>
                            <span class="file-name">${displayName}</span>
                            <span class="file-type">${file.type}</span>
                        </a>
                    `;
                }).join('');

                folderEl.innerHTML = `
                    <div class="folder-header">
                        <span class="folder-icon">${folder.icon}</span>
                        <span class="folder-name">${folder.name}</span>
                        <span class="folder-count">${filesToShow.length}</span>
                        <span class="folder-toggle">▶</span>
                    </div>
                    <div class="file-list">
                        ${fileListHTML}
                    </div>
                `;

                directoryEl.appendChild(folderEl);
            });

            // Show empty state if no results
            document.getElementById('emptyState').style.display = 
                visibleFolders === 0 ? 'block' : 'none';
            
            // Update visible count
            document.getElementById('visibleItems').textContent = visibleFolders;

            // Attach folder toggle listeners
            document.querySelectorAll('.folder-header').forEach(header => {
                header.addEventListener('click', () => {
                    header.parentElement.classList.toggle('expanded');
                });
            });

            // Auto-expand if searching
            if (searchResults && searchResults.length > 0) {
                document.querySelectorAll('.folder').forEach(f => f.classList.add('expanded'));
            }
        }

        // Update stats
        function updateStats() {
            const totalFiles = allItems.length;
            const totalFolders = directoryData.length;
            
            document.getElementById('totalFiles').textContent = totalFiles;
            document.getElementById('totalFolders').textContent = totalFolders;
        }

        // Search handler
        function handleSearch(query) {
            if (!query.trim()) {
                renderDirectory();
                return;
            }

            const results = fuse.search(query);
            renderDirectory(results);
        }

        // Attach event listeners
        function attachEventListeners() {
            // Search input
            const searchInput = document.getElementById('searchInput');
            let searchTimeout;
            searchInput.addEventListener('input', (e) => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    handleSearch(e.target.value);
                }, 200); // Debounce
            });

            // Keyboard shortcut (Ctrl/Cmd + K)
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                    e.preventDefault();
                    searchInput.focus();
                }
            });

            // Filter buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    
                    const query = searchInput.value;
                    if (query.trim()) {
                        handleSearch(query);
                    } else {
                        renderDirectory();
                    }
                });
            });
        }

        // Initialize on load
        init();
    </script>
</body>
</html>
