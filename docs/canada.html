<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANADA - ATC Charts</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
    <style>
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface-hover: #1c2128;
            --border: #30363d;
            --text: #e6edf3;
            --text-dim: #7d8590;
            --accent: #58a6ff;
            --accent-glow: rgba(88, 166, 255, 0.15);
            --warning: #d29922;
        }
        
        body {
            font-family: 'IBM Plex Mono', monospace;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 2px, var(--border) 2px, var(--border) 3px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, var(--border) 2px, var(--border) 3px);
            background-size: 60px 60px;
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; position: relative; z-index: 1; }
        
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            color: var(--text-dim);
        }
        
        .breadcrumb a { color: var(--accent); text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }
        .breadcrumb-separator { opacity: 0.5; }
        
        header {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        
        h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.02em;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
        }
        
        .subtitle {
            font-size: 0.875rem;
            color: var(--text-dim);
        }
        
        .search-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .search-wrapper { position: relative; margin-bottom: 0.5rem; }
        
        .search-input {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 2.75rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        
        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
        }
        
        .search-help {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 0.5rem;
        }
        
        .search-help code {
            background: var(--bg);
            padding: 0.15rem 0.4rem;
            border-radius: 3px;
            color: var(--accent);
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 3rem;
        }
        
        .stat {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            text-align: center;
        }
        
        .stat-value {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            display: block;
            margin-bottom: 0.25rem;
        }
        
        .stat-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-dim);
        }
        
        .filters {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        
        .filter-btn {
            padding: 0.5rem 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-dim);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        
        .filter-btn:hover { border-color: var(--accent); color: var(--text); }
        .filter-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }
    
        
        .airport-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        
        .airport-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            transition: all 0.2s;
            position: relative;
            display: flex;
            align-items: flex-start;
        }
        
        .airport-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--accent);
            transform: scaleY(0);
            transition: transform 0.2s;
            border-radius: 8px 0 0 8px;
        }
        
        .airport-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(88, 166, 255, 0.12);
        }
        
        .airport-card:hover::before { transform: scaleY(1); }
        
        .airport-link {
            display: block;
            padding: 1.5rem;
            text-decoration: none;
            color: var(--text);
            flex: 1;
            min-width: 0;
        }
        
        .airport-card .pin-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            opacity: 0.25;
            transition: opacity 0.2s;
            padding: 0.75rem 0.75rem 0 0;
            line-height: 1;
            flex-shrink: 0;
            align-self: flex-start;
        }
        .airport-card .pin-btn:hover { opacity: 0.8; }
        .airport-card .pin-btn.pinned { opacity: 1; }
        
        .airport-code {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 0.25rem;
        }
        
        .airport-name {
            font-size: 0.9rem;
            margin-bottom: 0.75rem;
        }
        
        .airport-stats {
            font-size: 0.75rem;
            color: var(--text-dim);
        }
        
        .airport-stats strong { color: var(--accent); }}
    
    </style>
</head>

        const PINS_KEY = 'atc_pins';
        function getPins() {
            try { return JSON.parse(localStorage.getItem(PINS_KEY)) || {airports: [], charts: []}; }
            catch(e) { return {airports: [], charts: []}; }
        }
        function savePins(p) { localStorage.setItem(PINS_KEY, JSON.stringify(p)); }
        function isAirportPinned(slug) { return getPins().airports.some(function(a) { return a.slug === slug; }); }
        function isChartPinned(url) { return getPins().charts.some(function(c) { return c.url === url; }); }
        function toggleAirportPin(airport) {
            var pins = getPins();
            var idx = pins.airports.findIndex(function(a) { return a.slug === airport.slug; });
            if (idx >= 0) pins.airports.splice(idx, 1);
            else pins.airports.push(Object.assign({}, airport, {pinnedAt: Date.now()}));
            savePins(pins);
        }
        function toggleChartPin(chart) {
            var pins = getPins();
            var idx = pins.charts.findIndex(function(c) { return c.url === chart.url; });
            if (idx >= 0) pins.charts.splice(idx, 1);
            else pins.charts.push(Object.assign({}, chart, {pinnedAt: Date.now()}));
            savePins(pins);
        }

            var spans = document.querySelectorAll('.breadcrumb span:not(.breadcrumb-separator)');

                return {type: 'airport', slug: slug, name: spans[0] ? spans[0].textContent : slug, region: links[1].textContent, regionSlug: regionSlug};
            }
            return {type: 'region', slug: slug, name: spans[0] ? spans[0].textContent : slug};
        }

        const fuse = new Fuse(airports, {
            keys: ['icao', 'name'],
            threshold: 0.3,
            includeMatches: true
        });
        
        function renderAirports(results = null) {
            const grid = document.getElementById('airportGrid');
            grid.innerHTML = '';
            
            const airportsToShow = results ? results.map(r => ({...r.item, matches: r.matches})) : airports;
            
            if (airportsToShow.length === 0) {
                document.getElementById('emptyState').style.display = 'block';
                return;
            }
            
            document.getElementById('emptyState').style.display = 'none';
            
            airportsToShow.forEach(airport => {
                const wrapper = document.createElement('div');
                wrapper.className = 'airport-card';

                const link = document.createElement('a');
                link.className = 'airport-link';
                link.href = airport.slug + '.html';
                link.innerHTML = `
                    <div class="airport-code">${airport.icao}</div>
                    <div class="airport-name">${airport.name}</div>
                    <div class="airport-stats">
                        <span>📄 <strong>${airport.fileCount}</strong> files</span>
                    </div>
                `;

                const pinned = isAirportPinned(airport.slug);
                const pinBtn = document.createElement('button');
                pinBtn.className = 'pin-btn' + (pinned ? ' pinned' : '');
                pinBtn.title = pinned ? 'Unpin from homepage' : 'Pin to homepage';
                pinBtn.textContent = '📌';
                pinBtn.onclick = function(e) {
                    e.stopPropagation();
                    const ctx = getPageContext();
                    toggleAirportPin({icao: airport.icao, name: airport.name, slug: airport.slug, region: ctx.name, regionSlug: ctx.slug, fileCount: airport.fileCount});
                    pinBtn.classList.toggle('pinned');
                    pinBtn.title = pinBtn.classList.contains('pinned') ? 'Unpin from homepage' : 'Pin to homepage';
                };

                wrapper.appendChild(link);
                wrapper.appendChild(pinBtn);
                grid.appendChild(wrapper);
            });
        }
        
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.trim();
            renderAirports(query ? fuse.search(query) : null);
        });
        
        renderAirports();
