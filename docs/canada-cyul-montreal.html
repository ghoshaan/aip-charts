        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface-hover: #1c2128;
            --border: #30363d;
            --text: #e6edf3;
            --text-dim: #7d8590;
            --accent: #58a6ff;
            --accent-glow: rgba(88, 166, 255, 0.15);
            --warning: #d29922;
        }
        
        body {
            font-family: 'IBM Plex Mono', monospace;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 2px, var(--border) 2px, var(--border) 3px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, var(--border) 2px, var(--border) 3px);
            background-size: 60px 60px;
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; position: relative; z-index: 1; }
        
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            color: var(--text-dim);
        }
        
        .breadcrumb a { color: var(--accent); text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }
        .breadcrumb-separator { opacity: 0.5; }
        
        header {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        
        h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.02em;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
        }
        
        .subtitle {
            font-size: 0.875rem;
            color: var(--text-dim);
        }
        
        .search-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .search-wrapper { position: relative; margin-bottom: 0.5rem; }
        
        .search-input {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 2.75rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        
        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
        }
        
        .search-help {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 0.5rem;
        }
        
        .search-help code {
            background: var(--bg);
            padding: 0.15rem 0.4rem;
            border-radius: 3px;
            color: var(--accent);
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 3rem;
        }
        
        .stat {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            text-align: center;
        }
        
        .stat-value {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            display: block;
            margin-bottom: 0.25rem;
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-dim);
        }
        
        .filters {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        
        .filter-btn {
            padding: 0.5rem 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-dim);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        
        .filter-btn:hover { border-color: var(--accent); color: var(--text); }
        .filter-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }
    
        
        .file-count {
            font-size: 0.875rem;
            color: var(--text-dim);
            margin-bottom: 1rem;
        }
        
        .file-list {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }
        
        .file-item {
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }
        
        .file-item:last-child { border-bottom: none; }
        
        .file-item:hover { background: var(--surface-hover); }
        
        .file-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 1.25rem;
            text-decoration: none;
            color: var(--text);
            flex: 1;
            transition: padding-left 0.15s;
        }
        
        .file-item:hover .file-link { padding-left: 1.5rem; }
        
        .file-icon { font-size: 1.2rem; flex-shrink: 0; }
        .file-name { flex: 1; font-size: 0.9rem; word-break: break-word; }
        
        .file-type {
            font-size: 0.75rem;
            color: var(--text-dim);
            background: var(--bg);
            padding: 0.3rem 0.6rem;
            border-radius: 3px;
            text-transform: uppercase;
            font-weight: 600;
        }

            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
            padding: 0.5rem 0.75rem;
            opacity: 0.25;
            transition: opacity 0.2s;
            flex-shrink: 0;
            line-height: 1;
        }
        .pin-btn:hover { opacity: 0.8; }
        .pin-btn.pinned { opacity: 1; }

    <script>
        const PINS_KEY = 'atc_pins';
        function getPins() {
            try { return JSON.parse(localStorage.getItem(PINS_KEY)) || {airports: [], charts: []}; }
            catch(e) { return {airports: [], charts: []}; }
        }
        function savePins(p) { localStorage.setItem(PINS_KEY, JSON.stringify(p)); }
        function isAirportPinned(slug) { return getPins().airports.some(function(a) { return a.slug === slug; }); }
        function isChartPinned(url) { return getPins().charts.some(function(c) { return c.url === url; }); }
        function toggleAirportPin(airport) {
            var pins = getPins();
            var idx = pins.airports.findIndex(function(a) { return a.slug === airport.slug; });
            if (idx >= 0) pins.airports.splice(idx, 1);
            else pins.airports.push(Object.assign({}, airport, {pinnedAt: Date.now()}));
            savePins(pins);
        }
        function toggleChartPin(chart) {
            var pins = getPins();
            var idx = pins.charts.findIndex(function(c) { return c.url === chart.url; });
            if (idx >= 0) pins.charts.splice(idx, 1);
            else pins.charts.push(Object.assign({}, chart, {pinnedAt: Date.now()}));
            savePins(pins);
        }
        function getPageContext() {
            var slug = window.location.pathname.split('/').pop().replace('.html', '');
            var regionSlug = slug.split('-')[0];
            var links = document.querySelectorAll('.breadcrumb a');
            var spans = document.querySelectorAll('.breadcrumb span:not(.breadcrumb-separator)');
            if (links.length >= 2) {
                return {type: 'airport', slug: slug, name: spans[0] ? spans[0].textContent : slug, region: links[1].textContent, regionSlug: regionSlug};
            }
            return {type: 'region', slug: slug, name: spans[0] ? spans[0].textContent : slug};
        }

                "url": "https://drive.google.com/file/d/1IFjGgXbUM4dIpqW9h8bODTqkzKrWu_bX/view?usp=drivesdk",
                "type": "pdf"
        },
        {
                "name": "CYYC_VESGA_6_ARR_RNAV_PG_03.pdf",
                "url": "https://drive.google.com/file/d/1KSQIbRSCdqZ2LXj1AAnWFS49c0-oQUJp/view?usp=drivesdk",
                "type": "pdf"
        }
];
        const fileIcons = {pdf: '📄', image: '🖼️', doc: '📝'};
        let currentFilter = 'all';
        
        const fuse = new Fuse(files, {
            keys: ['name'],
            threshold: 0.4,
            includeMatches: true
        });
        
        function renderFiles(results = null) {
            const listEl = document.getElementById('fileList');
            const emptyState = document.getElementById('emptyState');
            const fileCount = document.getElementById('fileCount');
            
            listEl.innerHTML = '';
            
            let filesToShow = results ? results.map(r => ({...r.item, matches: r.matches})) : files;
            
            if (currentFilter !== 'all') {
                filesToShow = filesToShow.filter(f => f.type === currentFilter);
            }
            
            if (filesToShow.length === 0) {
                listEl.style.display = 'none';
                emptyState.style.display = 'block';
                fileCount.textContent = 'No files found';
                return;
            }
            
            listEl.style.display = 'block';
            emptyState.style.display = 'none';
            fileCount.textContent = `Showing ${filesToShow.length} of ${files.length} files`;
            
            filesToShow.forEach(file => {
                const wrapper = document.createElement('div');
                wrapper.className = 'file-item';

                const link = document.createElement('a');
                link.className = 'file-link';
                link.href = file.url;
                link.target = '_blank';
                link.innerHTML = `
                    <span class="file-icon">${fileIcons[file.type] || '📄'}</span>
                    <span class="file-name">${file.name}</span>
                    <span class="file-type">${file.type}</span>
                `;

                const pinned = isChartPinned(file.url);
                const pinBtn = document.createElement('button');
                pinBtn.className = 'pin-btn' + (pinned ? ' pinned' : '');
                pinBtn.title = pinned ? 'Unpin from homepage' : 'Pin to homepage';
                pinBtn.textContent = '📌';
                pinBtn.onclick = () => {
                    const ctx = getPageContext();
                    toggleChartPin({name: file.name, url: file.url, type: file.type, airport: ctx.name, airportSlug: ctx.slug, region: ctx.region});
                    pinBtn.classList.toggle('pinned');
                    pinBtn.title = pinBtn.classList.contains('pinned') ? 'Unpin from homepage' : 'Pin to homepage';
                };

                wrapper.appendChild(link);
                wrapper.appendChild(pinBtn);
                listEl.appendChild(wrapper);
            });
        }
        
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.trim();
            renderFiles(query ? fuse.search(query) : null);
        });
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                
                const query = document.getElementById('searchInput').value.trim();
                renderFiles(query ? fuse.search(query) : null);
            });
        });
        
        renderFiles();
    </script>
</body>
</html>
