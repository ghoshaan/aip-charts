<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worldwide Procedure Search</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface-hover: #1c2128;
            --border: #30363d;
            --text: #e6edf3;
            --text-dim: #7d8590;
            --accent: #79b8ff;
            --accent-glow: rgba(121, 184, 255, 0.15);
            --warning: #d29922;
        }
        
        body {
            font-family: 'IBM Plex Mono', monospace;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 2px, var(--border) 2px, var(--border) 3px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, var(--border) 2px, var(--border) 3px);
            background-size: 60px 60px;
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; position: relative; z-index: 1; }
        
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            color: var(--text-dim);
        }
        
        .breadcrumb a { color: var(--accent); text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }
        .breadcrumb-separator { opacity: 0.5; }
        
        header {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        
        h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.02em;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
        }
        
        .subtitle {
            font-size: 0.875rem;
            color: var(--text-dim);
        }
        
        .search-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .search-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .search-wrapper { position: relative; }
        
        .search-input {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 2.75rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        
        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
        }

        .filters {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.4rem 0.8rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-dim);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .filter-btn:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg);
            font-weight: 600;
        }

        .results-info {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
        }
        
        .airport-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .airport-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }
        
        .airport-icao {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            line-height: 1.2;
        }
        
        .airport-meta {
            text-align: right;
        }

        .airport-country {
            font-size: 0.875rem;
            color: var(--text);
            font-weight: 600;
        }

        .airport-region {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .procedure-section {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1.5rem;
        }
        
        .procedure-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .procedure-list {
            list-style: none;
            font-size: 0.85rem;
        }
        
        .procedure-item {
            padding: 0.35rem 0.5rem;
            border-radius: 4px;
            background: var(--bg);
            margin-bottom: 0.25rem;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        
        .procedure-item:hover {
            border-color: var(--accent);
            background: var(--surface-hover);
        }

        .procedure-item.match {
            border-color: var(--warning);
            background: rgba(210, 153, 34, 0.1);
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-dim);
        }
        
        .no-procedures {
            font-size: 0.75rem;
            color: var(--text-dim);
            font-style: italic;
        }

        @media (max-width: 1024px) {
            .procedure-section { grid-template-columns: 1fr 1fr; }
        }

        @media (max-width: 768px) {
            .search-grid { grid-template-columns: 1fr; }
            .procedure-section { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="breadcrumb">
            <a href="index.html">Home</a>
            <span class="breadcrumb-separator">›</span>
            <span>Worldwide Search</span>
        </div>
        
        <header>
            <h1>🌍 Procedure Search</h1>
            <div class="subtitle">Search 24,000+ SIDs, STARs, and IAPs worldwide from Navigraph data</div>
        </header>
        
        <div class="search-section">
            <div class="search-grid">
                <div class="search-wrapper">
                    <span class="search-icon">📍</span>
                    <input type="text" id="locationInput" class="search-input" 
                           placeholder="Location (ICAO, Country, Airport)..." autocomplete="off" autofocus>
                </div>
                <div class="search-wrapper">
                    <span class="search-icon">✈️</span>
                    <input type="text" id="chartInput" class="search-input" 
                           placeholder="Chart Name (SID, STAR, IAP)..." autocomplete="off">
                </div>
            </div>

            <div class="filters" id="regionFilters">
                <button class="filter-btn active" data-region="All">All Regions</button>
                <button class="filter-btn" data-region="Africa">Africa</button>
                <button class="filter-btn" data-region="Asia">Asia</button>
                <button class="filter-btn" data-region="Europe">Europe</button>
                <button class="filter-btn" data-region="North America">North America</button>
                <button class="filter-btn" data-region="South America">South America</button>
                <button class="filter-btn" data-region="Oceania">Oceania</button>
            </div>
        </div>
        
        <div id="resultsInfo" class="results-info" style="display: none;">
            <span id="resultsCount"></span>
            <span id="filterStatus"></span>
        </div>
        
        <div id="results"></div>
        
        <div id="emptyState" class="empty-state">
            <div style="font-size: 3rem; opacity: 0.3;">🔍</div>
            <p>Start typing to search for airports or procedures...</p>
        </div>
    </div>

    <script>
        let searchIndex = [];
        let fuse = null;
        let selectedRegion = 'All';

        const locationInput = document.getElementById('locationInput');
        const chartInput = document.getElementById('chartInput');
        const resultsEl = document.getElementById('results');
        const emptyState = document.getElementById('emptyState');
        const resultsInfo = document.getElementById('resultsInfo');
        const resultsCount = document.getElementById('resultsCount');
        const regionFilters = document.getElementById('regionFilters');

        // Load data
        fetch('navigraph_search.json')
            .then(res => res.json())
            .then(data => {
                searchIndex = data;
                fuse = new Fuse(searchIndex, {
                    keys: [
                        { name: 'icao', weight: 2 },
                        { name: 'name', weight: 1.5 },
                        { name: 'country', weight: 1 },
                        { name: 'sids', weight: 0.5 },
                        { name: 'stars', weight: 0.5 },
                        { name: 'iaps', weight: 0.5 }
                    ],
                    threshold: 0.2,
                    limit: 30,
                    ignoreLocation: true,
                    useExtendedSearch: true
                });
                
                // If there's a hash, search for it
                const hash = window.location.hash.substring(1);
                if (hash) {
                    locationInput.value = decodeURIComponent(hash);
                    performSearch();
                }
            });

        [locationInput, chartInput].forEach(input => {
            input.addEventListener('input', () => performSearch());
        });

        regionFilters.addEventListener('click', (e) => {
            if (e.target.classList.contains('filter-btn')) {
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                selectedRegion = e.target.getAttribute('data-region');
                performSearch();
            }
        });

        function icaoPrefixMatches(locQ) {
            const upper = locQ.toUpperCase();
            return searchIndex.filter(a => a.icao.startsWith(upper)).map(item => ({ item }));
        }

        function mergeResults(primary, additional) {
            const seen = new Set(primary.map(r => r.item.icao));
            return [...primary, ...additional.filter(r => !seen.has(r.item.icao))];
        }

        function performSearch() {
            const locQ = locationInput.value.trim();
            const chartQ = chartInput.value.trim();

            if (locQ.length < 2 && chartQ.length < 2) {
                resultsEl.innerHTML = '';
                resultsInfo.style.display = 'none';
                emptyState.style.display = 'block';
                emptyState.innerHTML = '<div style="font-size: 3rem; opacity: 0.3;">🔍</div><p>Start typing to search for airports or procedures...</p>';
                return;
            }

            if (!fuse) return;

            let results;
            if (locQ && chartQ) {
                const fuseResults = fuse.search({
                    $and: [
                        { $or: [{ icao: locQ }, { name: locQ }, { country: locQ }] },
                        { $or: [{ sids: chartQ }, { stars: chartQ }, { iaps: chartQ }] }
                    ]
                });
                const chartLower = chartQ.toLowerCase();
                const prefixWithChart = icaoPrefixMatches(locQ).filter(r => {
                    const a = r.item;
                    return (a.sids && a.sids.some(s => s.toLowerCase().includes(chartLower))) ||
                           (a.stars && a.stars.some(s => s.toLowerCase().includes(chartLower))) ||
                           (a.iaps && a.iaps.some(s => s.toLowerCase().includes(chartLower)));
                });
                results = mergeResults(fuseResults, prefixWithChart);
            } else if (locQ) {
                const fuseResults = fuse.search({
                    $or: [{ icao: locQ }, { name: locQ }, { country: locQ }]
                });
                results = mergeResults(fuseResults, icaoPrefixMatches(locQ));
            } else {
                results = fuse.search({
                    $or: [{ sids: chartQ }, { stars: chartQ }, { iaps: chartQ }]
                });
            }

            // Filter by region
            if (selectedRegion !== 'All') {
                results = results.filter(r => r.item.region === selectedRegion);
            }

            if (results.length === 0) {
                resultsEl.innerHTML = '';
                resultsInfo.style.display = 'none';
                emptyState.style.display = 'block';
                emptyState.innerHTML = '<div style="font-size: 3rem; opacity: 0.3;">🔍</div><p>No matches found in ' + selectedRegion + ' matching your search</p>';
                return;
            }

            emptyState.style.display = 'none';
            resultsInfo.style.display = 'flex';
            resultsCount.textContent = `Found ${results.length} airports`;
            document.getElementById('filterStatus').textContent = selectedRegion !== 'All' ? `Filtering by ${selectedRegion}` : '';
            
            renderResults(results, locQ, chartQ);
        }

        function renderResults(results, locQ, chartQ) {
            resultsEl.innerHTML = '';
            const highlightQuery = (chartQ || locQ).toLowerCase();
            
            results.forEach(result => {
                const airport = result.item;
                const card = document.createElement('div');
                card.className = 'airport-card';
                
                // Helper to check if a procedure matches the query
                const isMatch = (p) => highlightQuery && p.toLowerCase().includes(highlightQuery);

                // Highlight matches in procedures
                const renderProcedure = (p) => {
                    return `<li class="procedure-item ${isMatch(p) ? 'match' : ''}">${p}</li>`;
                };

                // Sort procedures to put matches at the top
                const sortProcedures = (list) => {
                    if (!list) return [];
                    return [...list].sort((a, b) => {
                        const aM = isMatch(a);
                        const bM = isMatch(b);
                        if (aM && !bM) return -1;
                        if (!aM && bM) return 1;
                        return 0;
                    });
                };

                const sortedSids = sortProcedures(airport.sids);
                const sortedStars = sortProcedures(airport.stars);
                const sortedIaps = sortProcedures(airport.iaps);

                let sidsHtml = sortedSids.length > 0 
                    ? sortedSids.map(renderProcedure).join('')
                    : '<li class="no-procedures">No SIDs found</li>';
                    
                let starsHtml = sortedStars.length > 0 
                    ? sortedStars.map(renderProcedure).join('')
                    : '<li class="no-procedures">No STARs found</li>';

                let iapsHtml = sortedIaps.length > 0 
                    ? sortedIaps.map(renderProcedure).join('')
                    : '<li class="no-procedures">No IAPs found</li>';

                card.innerHTML = `
                    <div class="airport-header">
                        <div>
                            <div class="airport-icao">${airport.icao}</div>
                            <div style="font-size: 0.9rem; font-weight: 600; color: var(--text);">${airport.name || ''}</div>
                        </div>
                        <div class="airport-meta">
                            <div class="airport-country">${airport.country}</div>
                            <div class="airport-region">${airport.region}</div>
                        </div>
                    </div>
                    <div class="procedure-section">
                        <div>
                            <div class="procedure-title">🛫 SIDs (${airport.sids.length})</div>
                            <ul class="procedure-list">${sidsHtml}</ul>
                        </div>
                        <div>
                            <div class="procedure-title">🛬 STARs (${airport.stars.length})</div>
                            <ul class="procedure-list">${starsHtml}</ul>
                        </div>
                        <div>
                            <div class="procedure-title">🎯 IAPs (${airport.iaps ? airport.iaps.length : 0})</div>
                            <ul class="procedure-list">${iapsHtml}</ul>
                        </div>
                    </div>
                `;
                resultsEl.appendChild(card);
            });
        }
    </script>
</body>
</html>
