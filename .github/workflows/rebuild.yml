name: Full Rebuild (Drive sync)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Restore chart cache
        uses: actions/cache@v4
        with:
          path: |
            docs/charts_data
            manifest.json
          key: charts-${{ github.run_id }}
          restore-keys: charts-

      - name: Generate site
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: python generate_multipage_directory.py

      - name: Remove chart PDFs (not deployed to Pages)
        run: rm -rf docs/charts_data

      - name: Commit and push regenerated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "chore: regenerate site from Drive [skip ci]"
          git push
