name: Full Rebuild (Drive sync)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Restore chart cache
        uses: actions/cache@v4
        with:
          path: |
            docs/charts_data
            manifest.json
          key: charts-${{ hashFiles('manifest.json') }}
          restore-keys: charts-

      - name: Generate site
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: python generate_multipage_directory.py

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs
          clean: true
          single-commit: true

      - name: Remove chart PDFs from runner for main commit
        run: rm -rf docs/charts_data

      - name: Commit and push regenerated docs to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ manifest.json generate_multipage_directory.py
          git diff --staged --quiet || git commit -m "chore: regenerate site from Drive [skip ci]"
          git push origin main
