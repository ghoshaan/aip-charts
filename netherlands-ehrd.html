<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EHRD - ATC Charts</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
    <style>
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface-hover: #1c2128;
            --border: #30363d;
            --text: #e6edf3;
            --text-dim: #7d8590;
            --accent: #58a6ff;
            --accent-glow: rgba(88, 166, 255, 0.15);
            --warning: #d29922;
        }
        
        body {
            font-family: 'IBM Plex Mono', monospace;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 2px, var(--border) 2px, var(--border) 3px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, var(--border) 2px, var(--border) 3px);
            background-size: 60px 60px;
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; position: relative; z-index: 1; }
        
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            color: var(--text-dim);
        }
        
        .breadcrumb a { color: var(--accent); text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }
        .breadcrumb-separator { opacity: 0.5; }
        
        header {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        
        h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.02em;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
        }
        
        .subtitle {
            font-size: 0.875rem;
            color: var(--text-dim);
        }
        
        .search-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .search-wrapper { position: relative; margin-bottom: 0.5rem; }
        
        .search-input {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 2.75rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        
        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
        }
        
        .search-help {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 0.5rem;
        }
        
        .search-help code {
            background: var(--bg);
            padding: 0.15rem 0.4rem;
            border-radius: 3px;
            color: var(--accent);
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 3rem;
        }
        
        .stat {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            text-align: center;
        }
        
        .stat-value {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            display: block;
            margin-bottom: 0.25rem;
        }
        
        .stat-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-dim);
        }
        
        .filters {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        
        .filter-btn {
            padding: 0.5rem 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-dim);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        
        .filter-btn:hover { border-color: var(--accent); color: var(--text); }
        .filter-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }
    
        
        .file-count {
            font-size: 0.875rem;
            color: var(--text-dim);
            margin-bottom: 1rem;
        }
        
        .file-list {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }
        
        .file-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
            text-decoration: none;
            color: var(--text);
            transition: all 0.15s;
        }
        
        .file-item:last-child { border-bottom: none; }
        
        .file-item:hover {
            background: var(--surface-hover);
            padding-left: 1.5rem;
        }
        
        .file-icon { font-size: 1.2rem; flex-shrink: 0; }
        .file-name { flex: 1; font-size: 0.9rem; word-break: break-word; }
        
        .file-type {
            font-size: 0.65rem;
            color: var(--text-dim);
            background: var(--bg);
            padding: 0.3rem 0.6rem;
            border-radius: 3px;
            text-transform: uppercase;
            font-weight: 600;
        }
    
    </style>
</head>
<body>
    <div class="container">
        <div class="breadcrumb">
            <a href="index.html">Home</a>
            <span class="breadcrumb-separator">›</span>
            <a href="netherlands.html">Netherlands</a>
            <span class="breadcrumb-separator">›</span>
            <span>EHRD</span>
        </div>
        
        <header>
            <h1>EHRD</h1>
            <div class="subtitle">Charts and procedures</div>
        </header>
        
        <div class="search-section">
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" class="search-input" 
                       placeholder="Search charts..." autocomplete="off">
            </div>
            <div class="search-help">
                <strong>Examples:</strong> <code>star</code> • <code>RWY 04</code> • <code>ILS</code>
            </div>
        </div>
        
        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pdf">PDF</button>
            <button class="filter-btn" data-filter="image">Images</button>
        </div>
        
        <hr style="margin: 2rem 0; border: none; border-top: 1px solid var(--border);">
        
        <div class="file-count" id="fileCount">Showing 22 files</div>
        <div class="file-list" id="fileList"></div>
        <div id="emptyState" class="empty-state" style="display: none;">
            <div style="font-size: 3rem; opacity: 0.3;">🔍</div>
            <p>No files found.</p>
        </div>
    </div>
    
    <script>
        const files = [
        {
                "name": "STANDARD_DEPARTURE_CHART-INSTRUMENT_RWY_06_EAST.pdf",
                "url": "https://drive.google.com/file/d/1t49zulp1gpJdXHTtxMi5J0khkh0BEpty/view?usp=drivesdk",
                "type": "pdf"
        },
        {
                "name": "STANDARD_DEPARTURE_CHART-INSTRUMENT_RWY_24_EAST.pdf",
                "url": "https://drive.google.com/file/d/14mDCVFHzj8OwXnV-elOXjqJs5QdRRkuL/view?usp=drivesdk",
                "type": "pdf"
        },
        {
                "name": "STANDARD_DEPARTURE_CHART-INSTRUMENT_RWY_24_WEST.pdf",
                "url": "https://drive.google.com/file/d/1NIChnnamlcSoLRm--qkVLGiG8CqF7Sin/view?usp=drivesdk",
                "type": "pdf"
        },
        {
                "name": "STANDARD_DEPARTURE_CHART-INSTRUMENT_RWY_06_WEST.pdf",
                "url": "https://drive.google.com/file/d/1qoiqSt8iKxi6Qm6VzO2ao1x1fVZaXvfY/view?usp=drivesdk",
                "type": "pdf"
        },
        {
                "name": "VFR_TRAFFIC_CIRCUITS_RADIO_EQUIPPED_LIGHT_ACFT.pdf",
                "url": "https://drive.google.com/file/d/1ZzSTSCbGeU_A7o3c6ObuIS2riI-pmHq2/view?usp=drivesdk",
                "type": "pdf"
        },
        {
                "name": "AERODROME_OBSTACLE_CHART_-_TYPE_A_RWY_06-24.pdf",
                "url": "https://drive.google.com/file/d/195-CG4BqV6i4CCOviPx6ekPVBvuccWYT/view?usp=drivesdk",
                "type": "pdf"
        },
        {
                "name": "AERODROME_GROUND_MOVEMENT_CHART_RWY_24.pdf",
                "url": "https://drive.google.com/file/d/1bH6oiHObSn9yJGyVGsaDacPmWKgpIQtM/view?usp=drivesdk",
                "type": "pdf"
        },
        {
                "name": "STANDARD_DEPARTURE_CHART_-_INSTRUMENT.pdf",
                "url": "https://drive.google.com/file/d/1XCw8Ouby5TiV6UkOm37_H20gEGRVzYeR/view?usp=drivesdk",
                "type": "pdf"
        },
        {
                "name": "AERODROME_GROUND_MOVEMENT_CHART_RWY_06.pdf",
                "url": "https://drive.google.com/file/d/1NwyYK4U8Yt3r6Oihwx1hQoukCT2uHEFr/view?usp=drivesdk",
                "type": "pdf"
        },
        {
                "name": "AERODROME_CHART.pdf",
                "url": "https://drive.google.com/file/d/1AjY-mx9NggjQd_RkwJTmnE7mpBkEXjaL/view?usp=drivesdk",
                "type": "pdf"
        },
        {
                "name": "AIRCRAFT_PARKING_DOCKING_CHART.pdf",
                "url": "https://drive.google.com/file/d/1GMEXjM6rGfcNEZ_EXhhnhN9lyQPaPVai/view?usp=drivesdk",
                "type": "pdf"
        },
        {
                "name": "VISUAL_APPROACH_CHARTVFR_PROCEDURES.pdf",
                "url": "https://drive.google.com/file/d/1oXH2VQxw4Aeti-DYtvfB2B8BTeBRkEDp/view?usp=drivesdk",
                "type": "pdf"
        },
        {
                "name": "VFR_TRAINING_CIRCUITS.pdf",
                "url": "https://drive.google.com/file/d/1gPD9mz1jO3m553yP6M4vWiq7u3_lLfI7/view?usp=drivesdk",
                "type": "pdf"
        },
        {
                "name": "INSTRUMENT_APPROACH_CHART_RNP_RWY_06.pdf",
                "url": "https://drive.google.com/file/d/1uVW2iL6DunBt5ZPbRzMg3_nz9ne2PnMw/view?usp=drivesdk",
                "type": "pdf"
        },
        {
                "name": "INSTRUMENT_APPROACH_CHART_ILS_OR_LOC_RWY_06.pdf",
                "url": "https://drive.google.com/file/d/1icHzh65UG0MwSS4TVx7xGY8eNUbdVFfE/view?usp=drivesdk",
                "type": "pdf"
        },
        {
                "name": "INSTRUMENT_APPROACH_CHART_ILS_Z_OR_LOC_Z_RWY_24.pdf",
                "url": "https://drive.google.com/file/d/1cwvN5SC9XVG0Iwa1ErJjAIdr66bsKp5n/view?usp=drivesdk",
                "type": "pdf"
        },
        {
                "name": "INSTRUMENT_APPROACH_CHART_ILS_Y_OR_LOC_Y_RWY_24.pdf",
                "url": "https://drive.google.com/file/d/1EoeHLQswla8nQwsXFkvtAw2_CGuuDzFh/view?usp=drivesdk",
                "type": "pdf"
        },
        {
                "name": "INSTRUMENT_APPROACH_CHART_VOR_RWY_24.pdf",
                "url": "https://drive.google.com/file/d/1q35sffNPsVI0ggI2SqDqJQGloURD9Ljo/view?usp=drivesdk",
                "type": "pdf"
        },
        {
                "name": "INSTRUMENT_APPROACH_CHART_VOR_RWY_06.pdf",
                "url": "https://drive.google.com/file/d/1e-whpY9YDN8vH5jGhdXfDbH0k-vr4Gd0/view?usp=drivesdk",
                "type": "pdf"
        },
        {
                "name": "INSTRUMENT_APPROACH_CHART_RNP_RWY_24.pdf",
                "url": "https://drive.google.com/file/d/1nm4Q0XlOEt3nkwBG5xCRnbNiLX5zXW3U/view?usp=drivesdk",
                "type": "pdf"
        },
        {
                "name": "STANDARD_ARRIVAL_CHART_-_INSTRUMENT.pdf",
                "url": "https://drive.google.com/file/d/1NH8YVmhE04Et0LNHP4-nAqiHkQSuN4yX/view?usp=drivesdk",
                "type": "pdf"
        },
        {
                "name": "ATC_SURVEILLANCE_MINIMUM_ALTITUDE_CHART.pdf",
                "url": "https://drive.google.com/file/d/1ASsb8cNFQDjbM0xa4_bVc0HkVt86sp48/view?usp=drivesdk",
                "type": "pdf"
        }
];
        const fileIcons = {pdf: '📄', image: '🖼️', doc: '📝'};
        let currentFilter = 'all';
        
        const fuse = new Fuse(files, {
            keys: ['name'],
            threshold: 0.4,
            includeMatches: true
        });
        
        function renderFiles(results = null) {
            const listEl = document.getElementById('fileList');
            const emptyState = document.getElementById('emptyState');
            const fileCount = document.getElementById('fileCount');
            
            listEl.innerHTML = '';
            
            let filesToShow = results ? results.map(r => ({...r.item, matches: r.matches})) : files;
            
            if (currentFilter !== 'all') {
                filesToShow = filesToShow.filter(f => f.type === currentFilter);
            }
            
            if (filesToShow.length === 0) {
                listEl.style.display = 'none';
                emptyState.style.display = 'block';
                fileCount.textContent = 'No files found';
                return;
            }
            
            listEl.style.display = 'block';
            emptyState.style.display = 'none';
            fileCount.textContent = `Showing ${filesToShow.length} of ${files.length} files`;
            
            filesToShow.forEach(file => {
                const item = document.createElement('a');
                item.className = 'file-item';
                item.href = file.url;
                item.target = '_blank';
                item.innerHTML = `
                    <span class="file-icon">${fileIcons[file.type] || '📄'}</span>
                    <span class="file-name">${file.name}</span>
                    <span class="file-type">${file.type}</span>
                `;
                listEl.appendChild(item);
            });
        }
        
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.trim();
            renderFiles(query ? fuse.search(query) : null);
        });
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                
                const query = document.getElementById('searchInput').value.trim();
                renderFiles(query ? fuse.search(query) : null);
            });
        });
        
        renderFiles();
    </script>
</body>
</html>
